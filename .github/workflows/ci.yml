name: Machine Learning OPs CI Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  retrain-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow pandas scikit-learn

    - name: Run MLflow Project (Re-training Model)
      run: |
        mlflow run MLProject --env-manager local

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image using MLflow
      run: |
        # 1. Pindah ke direktori MLProject tempat mlruns berada
        cd MLProject
        
        # 2. Gunakan MLflow API resmi lewat Python untuk mencari lokasi folder model teranyar secara presisi
        MODEL_URI=$(python -c "import mlflow; exp = mlflow.get_experiment_by_name('Eksperimen_Prediksi_Dropout_Maspuri'); runs = mlflow.search_runs(experiment_ids=[exp.experiment_id], order_by=['attributes.start_time DESC']); print(f'runs:/{runs.iloc[0].run_id}/model')")
        echo "Akurat menemukan Model URI: $MODEL_URI"
        
        # 3. Bangun Docker menggunakan URI resmi hasil pelacakan Python
        mlflow models build-docker -m "$MODEL_URI" -n "${{ secrets.DOCKERHUB_USERNAME }}/mlflow-model:latest" --env-manager local

    - name: Push Docker Image to Docker Hub
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/mlops-dropout-model:latest