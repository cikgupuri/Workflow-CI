name: Machine Learning OPs CI Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  retrain-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow pandas scikit-learn

    - name: Run MLflow Project (Re-training Model)
      run: |
        mlflow run MLProject --env-manager local

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image using MLflow
      run: |
        - name: Build Docker Image using MLflow
      run: |
        - name: Build Docker Image using MLflow
      run: |
        # 1. Gunakan Python bawaan runner untuk mencari berkas meta.yaml dan mengambil run_id secara aman
        DYNAMIC_RUN_ID=$(python -c "import pathlib, yaml; meta_path = next(pathlib.Path('.').glob('**/artifacts/model/../../meta.yaml')); meta = yaml.safe_load(meta_path.read_text()); print(meta['run_id'])")
        
        echo "Berhasil menemukan Run ID: $DYNAMIC_RUN_ID"
        
        # 2. Bangun Docker Image menggunakan URI resmi MLflow
        mlflow models build-docker -m "runs:/$DYNAMIC_RUN_ID/model" -n "${{ secrets.DOCKERHUB_USERNAME }}/mlflow-model:latest" --env-manager local

    - name: Push Docker Image to Docker Hub
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/mlops-dropout-model:latest