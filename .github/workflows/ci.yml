name: Machine Learning OPs CI Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  retrain-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow pandas scikit-learn

    - name: Run MLflow Project (Re-training Model)
      run: |
        mlflow run MLProject --env-manager local

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image using MLflow
      run: |
        # 1. Investigasi total: Cetak posisi folder aktif saat ini
        echo "=== POSISI DIREKTORI SEKARANG ==="
        pwd
        
        # 2. Cetak seluruh isi folder root untuk melihat apakah mlruns ada
        echo "=== ISI FOLDER UTAMA (ROOT) ==="
        ls -la
        
        # 3. Cetak isi folder MLProject
        echo "=== ISI FOLDER MLPROJECT ==="
        ls -la MLProject/
        
        # 4. Cari tahu apakah ada folder bernama mlruns di seluruh komputer
        echo "=== MENCARI LOKASI FOLDER MLRUNS ==="
        find . -name "mlruns" -type d

    - name: Push Docker Image to Docker Hub
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/mlops-dropout-model:latest