name: Machine Learning OPs CI Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  retrain-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow pandas scikit-learn

    - name: Run MLflow Project (Re-training Model)
      run: |
        mlflow run MLProject --env-manager local

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image using MLflow
      run: |
        # 1. Cari jalur folder model secara fisik dari root workspace
        MODEL_PATH=$(find mlruns/ -path "*/artifacts/model" -type d | head -n 1)
        echo "Berhasil menemukan jalur fisik model: $MODEL_PATH"
        
        # 2. Bangun Docker menggunakan tag nama yang disinkronkan: mlops-dropout-model
        mlflow models build-docker -m "$MODEL_PATH" -n "${{ secrets.DOCKERHUB_USERNAME }}/mlops-dropout-model:latest" --env-manager local

    - name: Push Docker Image to Docker Hub
      run: |
        # Mengirimkan image yang namanya sudah sinkron dengan tahap di atas
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/mlops-dropout-model:latest