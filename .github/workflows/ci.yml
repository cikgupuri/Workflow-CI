name: Machine Learning OPs CI Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  retrain-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow pandas scikit-learn

    - name: Run MLflow Project (Re-training Model)
      run: |
        mlflow run MLProject --env-manager local

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image using MLflow
      run: |
        # 1. Pindah ke direktori project tempat mlruns berada
        cd MLProject
        
        # 2. Cari nama folder artifact yang sesungguhnya di dalam folder run terakhir (latest)
        ARTIFACT_NAME=$(ls -d mlruns/0/latest/artifacts/*/ | head -n 1 | xargs basename)
        echo "Nama folder artifact model yang ditemukan: $ARTIFACT_NAME"
        
        # 3. Bangun Docker menggunakan nama folder artifact yang terdeteksi secara dinamis
        mlflow models build-docker -m "mlruns/0/latest/artifacts/$ARTIFACT_NAME" -n "${{ secrets.DOCKERHUB_USERNAME }}/mlflow-model:latest" --env-manager local

    - name: Push Docker Image to Docker Hub
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/mlops-dropout-model:latest