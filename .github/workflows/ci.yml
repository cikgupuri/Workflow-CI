name: Machine Learning OPs CI Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  retrain-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow pandas scikit-learn

    - name: Run MLflow Project (Re-training Model)
      run: |
        mlflow run MLProject --env-manager local

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image using MLflow
      run: |
        # 1. Masuk ke folder project tempat proses training menghasilkan folder mlruns
        cd MLProject
        
        # 2. Cari jalur folder 'model' yang berada di dalam struktur artifacts secara fisik
        MODEL_PATH=$(find mlruns/ -path "*/artifacts/model" -type d | head -n 1)
        echo "Berhasil menemukan jalur fisik model: $MODEL_PATH"
        
        # 3. Validasi untuk memastikan folder benar-benar ada sebelum build docker
        if [ -z "$MODEL_PATH" ]; then
          echo "Error: Folder model artifacts tidak ditemukan di dalam MLProject/mlruns!"
          exit 1
        fi
        
        # 4. Bangun Docker menggunakan jalur lokal relatif yang valid
        mlflow models build-docker -m "$MODEL_PATH" -n "${{ secrets.DOCKERHUB_USERNAME }}/mlflow-model:latest" --env-manager local

    - name: Push Docker Image to Docker Hub
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/mlops-dropout-model:latest